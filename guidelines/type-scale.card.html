<!-- @dsCard group="Type" viewport="700x220" name="Type scale" subtitle="IBM Plex Sans — display to caption" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--pv-font-sans); color: var(--pv-text-strong); background: var(--pv-neutral-0); padding: 20px; }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--pv-neutral-100); }
  .r:last-child { border: 0; }
  .tag { font-family: var(--pv-font-mono); font-size: 11px; color: var(--pv-text-subtle); width: 130px; flex: none; }
  .d { font-size: var(--pv-text-display); font-weight: 700; letter-spacing: -.01em; }
  .h1 { font-size: var(--pv-text-h1); font-weight: 700; }
  .h2 { font-size: var(--pv-text-h2); font-weight: 600; }
  .h3 { font-size: var(--pv-text-h3); font-weight: 600; }
  .bd { font-size: var(--pv-text-base); font-weight: 400; color: var(--pv-text-body); }
  .sm { font-size: var(--pv-text-xs); font-weight: 500; color: var(--pv-text-muted); }
</style>
</head>
<body>
  <div class="r"><span class="tag">display · 30/700</span><span class="d">1,284 tickets</span></div>
  <div class="r"><span class="tag">h1 · 24/700</span><span class="h1">SLA Monitoring Center</span></div>
  <div class="r"><span class="tag">h2 · 19/600</span><span class="h2">Top complaint categories</span></div>
  <div class="r"><span class="tag">h3 · 16/600</span><span class="h3">Feedback #PV-10293</span></div>
  <div class="r"><span class="tag">body · 14/400</span><span class="bd">Patient reported a long wait at the radiology front desk.</span></div>
  <div class="r"><span class="tag">caption · 12/500</span><span class="sm">Updated 4 minutes ago · Quality Dept.</span></div>
</body>
</html>
