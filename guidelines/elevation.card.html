<!-- @dsCard group="Spacing" viewport="700x150" name="Elevation" subtitle="Soft cool-tinted clinical shadows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--pv-font-sans); background: var(--pv-neutral-50); padding: 26px; display: flex; gap: 26px; }
  .card { background: #fff; width: 130px; height: 78px; border-radius: var(--pv-radius-md); display: flex; align-items: flex-end; padding: 12px; box-sizing: border-box; }
  .t { font-family: var(--pv-font-mono); font-size: 11px; color: var(--pv-text-muted); }
</style>
</head>
<body>
  <div class="card" style="box-shadow:var(--pv-shadow-xs)"><span class="t">shadow-xs</span></div>
  <div class="card" style="box-shadow:var(--pv-shadow-sm)"><span class="t">shadow-sm</span></div>
  <div class="card" style="box-shadow:var(--pv-shadow-md)"><span class="t">shadow-md</span></div>
  <div class="card" style="box-shadow:var(--pv-shadow-lg)"><span class="t">shadow-lg</span></div>
</body>
</html>
