<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Slate scale" subtitle="Text, surfaces, borders" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--pv-font-sans); background: var(--pv-neutral-0); padding: 18px; }
  .scale { display: flex; border-radius: var(--pv-radius-md); overflow: hidden; box-shadow: inset 0 0 0 1px rgba(15,23,42,.06); }
  .step { flex: 1; height: 64px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; font-family: var(--pv-font-mono); font-size: 10px; }
  .label { font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--pv-text-muted); margin: 0 0 10px; }
</style>
</head>
<body>
  <div class="label">Neutral · Slate</div>
  <div class="scale">
    <div class="step" style="background:var(--pv-neutral-50);color:#475569">50</div>
    <div class="step" style="background:var(--pv-neutral-100);color:#475569">100</div>
    <div class="step" style="background:var(--pv-neutral-200);color:#475569">200</div>
    <div class="step" style="background:var(--pv-neutral-300);color:#334155">300</div>
    <div class="step" style="background:var(--pv-neutral-400);color:#fff">400</div>
    <div class="step" style="background:var(--pv-neutral-500);color:#fff">500</div>
    <div class="step" style="background:var(--pv-neutral-600);color:#fff">600</div>
    <div class="step" style="background:var(--pv-neutral-700);color:#fff">700</div>
    <div class="step" style="background:var(--pv-neutral-800);color:#fff">800</div>
    <div class="step" style="background:var(--pv-neutral-900);color:#fff">900</div>
  </div>
</body>
</html>
