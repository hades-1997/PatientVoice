<!-- @dsCard group="Components" viewport="700x190" name="Data — KPI stat cards" subtitle="Dashboard metric tiles with trend deltas" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--pv-font-sans); background: var(--pv-neutral-50); padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { StatCard } = window.PatientVoiceDesignSystem_16c56a;
    function Demo() {
      return (
        <div className="grid">
          <StatCard label="New feedback today" value="42" delta={12} deltaLabel="vs yesterday" icon="inbox" tone="primary" />
          <StatCard label="Open tickets" value="318" delta={-4} invertDelta deltaLabel="vs last week" icon="ticket" tone="secondary" />
          <StatCard label="Overdue" value="7" delta={2} invertDelta deltaLabel="needs action" icon="alarm-clock-off" tone="critical" />
          <StatCard label="SLA compliance" value="94.2" unit="%" delta={1.8} deltaLabel="vs last week" icon="gauge" tone="success" />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
    requestAnimationFrame(() => window.lucide && window.lucide.createIcons());
  </script>
</body>
</html>
